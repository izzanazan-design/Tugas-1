    <body style="background-color: darkseagreen;font-family: Verdana;text-align: justify;">
        <h3>HUBUNGI KAMI</h3>
        <p>Punya pertanyaan lebih lanjut tentang panel surya atau tentang energi terbarukan? Silahkan kirim pesan melalui form dibawah ini dan mari berdiskusi lebih lanjut.</p>
        <hr>
        <form action="#" method="post">
            <label for="Nama">Nama Lengkap : </label>
            <input type="text" id="Nama" name="Nama"><br><br>
            <label for="Email">Alamat Email :</label>
            <input type="text" id="Email" name="Email"><br><br>
            <label for="Teknologi">Pilih topik Pertanyaan terkait teknologi :</label>
            <select name="Teknologi" id="Teknologi">
                <option value="1panel">Sistem On-Grid</option>
                <option value="2panel">Sistem Off-Grid</option>
                <option value="3panel">Baterai Penyimpanan</option>
                <option value="4panel">Inverter</option>
                <option value="5panel">Modul Panel</option>
                <option value="6panel">Topik Lainnya</option>
            </select><br><br>
            <label for="pesan">Kirim pesan/pertanyaan</label><br><br>
            <textarea id="pesan" name="pesan"  rows="5" cols="40"></textarea>          
        </form>
        <button type="button">Kirim</button>
